{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-3">{{ test.title }}</h2>
    <p><strong>Subject:</strong> {{ test.subject.name }} | <strong>Difficulty:</strong> {{ test.difficulty }}</p>

    <!-- ⏳ Timer Display -->
    <div id="timer" class="alert alert-primary text-center fw-bold"></div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label_tag }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success">Submit Test</button>
    </form>
</div>

<!-- 🕒 JavaScript Countdown -->
<script>
    let minutes = {{ test.time_limit }};
    let seconds = 0;

    function updateTimerDisplay() {
        const timerDiv = document.getElementById("timer");
        timerDiv.innerText = `⏳ Time Remaining: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    function countdown() {
        updateTimerDisplay();

        if (minutes === 0 && seconds === 0) {
            alert("⏰ Time is up! Submitting your quiz...");
            document.querySelector("form").submit();  // Auto submit
        } else {
            if (seconds === 0) {
                minutes--;
                seconds = 59;
            } else {
                seconds--;
            }
            setTimeout(countdown, 1000);
        }
    }

    countdown();
</script>
{% endblock %}
