{% extends 'base.html' %}
{% block content %}
<div class="card shadow p-4">
    <h3 class="mb-3 text-primary">👤 Profile</h3>
    <table class="table table-bordered">
        <tr>
            <th>Username</th>
            <td>{{ user.username }}</td>
        </tr>
        <tr>
            <th>Email</th>
            <td>{{ user.email }}</td>
        </tr>
        <tr>
            <th>Role</th>
            <td>
                Student
            </td>
        </tr>
        <tr>
            <th>Date Joined</th>
            <td>{{ user.date_joined }}</td>
        </tr>
        <tr>
            <th>Last Login</th>
            <td>{{ user.last_login }}</td>
        </tr>
    </table>
</div>
{% endblock %}
